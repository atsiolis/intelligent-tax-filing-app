<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Eforion</title>
        <link rel="stylesheet" href="styles.css" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <nav class="navbar">
            <span class="logo">Eforion</span>
            <span class="nav-badge">AI-Powered</span>
        </nav>

        <main class="container">
            <header class="page-header">
                <h1>Tax Filing Assistant</h1>
                <p>
                    Enter your details below to receive AI-generated tax guidance.
                </p>
            </header>

            <form id="taxForm" novalidate>
                <div class="form-row">
                    <div class="form-group">
                        <label for="income">Annual Income</label>
                        <div class="input-wrapper">
                            <span class="prefix">€</span>
                            <input
                                type="number"
                                id="income"
                                placeholder="0.00"
                                min="0"
                                step="0.01"
                                required
                            />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="expenses">Annual Expenses</label>
                        <div class="input-wrapper">
                            <span class="prefix">€</span>
                            <input
                                type="number"
                                id="expenses"
                                placeholder="0.00"
                                min="0"
                                step="0.01"
                                required
                            />
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="filingStatus">Filing Status</label>
                        <div class="select-wrapper">
                            <select id="filingStatus" required>
                                <option value="" disabled selected>Select status</option>
                                <option value="single">Single</option>
                                <option value="married_joint">Married — Filing Jointly</option>
                                <option value="married_separate">Married — Filing Separately</option>
                                <option value="head_of_household">Head of Household</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="dependents">Number of Dependents</label>
                        <input
                            type="number"
                            id="dependents"
                            placeholder="0"
                            min="0"
                            max="20"
                            required
                        />
                    </div>
                </div>

                <div class="form-group">
                    <label>Employment Type</label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input
                                type="radio"
                                name="employmentType"
                                value="employed"
                                required
                            />
                            <span>Employed</span>
                        </label>
                        <label class="radio-option">
                            <input
                                type="radio"
                                name="employmentType"
                                value="self_employed"
                            />
                            <span>Self-Employed</span>
                        </label>
                        <label class="radio-option">
                            <input
                                type="radio"
                                name="employmentType"
                                value="freelancer"
                            />
                            <span>Freelancer</span>
                        </label>
                        <label class="radio-option">
                            <input
                                type="radio"
                                name="employmentType"
                                value="mixed"
                            />
                            <span>Mixed Income</span>
                        </label>
                    </div>
                </div>

                <div id="formError" class="error-msg hidden">
                    <span id="formErrorMsg"></span>
                </div>

                <div class="form-actions">
                    <button type="submit" id="submitBtn">Analyse My Tax Situation</button>
                    <button type="reset" class="btn-ghost">Clear</button>
                </div>
            </form>

            <div id="loadingCard" class="loading hidden">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <p>Analysing your tax situation…</p>
            </div>

            <div id="resultCard" class="result hidden">
                <div class="result-header">
                    <strong>Your Tax Advice</strong>
                    <span>Generated by Eforion</span>
                </div>
                <div id="resultContent" class="result-body"></div>
                <p class="disclaimer">
                    ⚠ AI-generated guidance only. Consult a registered tax
                    practitioner for professional advice.
                </p>
            </div>
        </main>

        <footer>
            <p>Eforion — 2026</p>
        </footer>

        <script src="js/validation.js"></script>
        <script src="js/api.js"></script>
        <script src="js/ui.js"></script>
        <script src="js/main.js"></script>
    </body>
</html>
